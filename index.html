<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #333;
    --accent: #4fc3f7;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #666;
    --gap: 3px;
    --label-w: 82px;
    --cell-a: #323232;
    --cell-b: #262626;
    --outer-pad: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 28px 0 80px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    margin-bottom: 28px;
    text-align: center;
    padding: 0 8px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  button {
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    border: none;
    transition: all 0.15s;
  }
  .btn-add {
    background: var(--accent);
    color: #000;
    padding: 10px;
    font-weight: 700;
    text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .btn-add:hover { background: #81d4fa; transform: translateY(-1px); }
  .btn-save {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 10px;
    text-transform: uppercase;
  }
  .btn-save:hover { background: rgba(79,195,247,0.1); }
  .btn-load {
    background: transparent;
    color: #a0e080;
    border: 1px solid #a0e080;
    padding: 10px;
    text-transform: uppercase;
  }
  .btn-load:hover { background: rgba(160,224,128,0.1); }

  .toolbar-filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .btn-sort {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px;
    text-transform: uppercase;
  }
  .btn-sort:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .bpm-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    padding: 6px 10px;
    background: transparent;
  }
  .bpm-filter-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .bpm-filter input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    width: 38px;
    outline: none;
    text-align: center;
    -moz-appearance: textfield;
  }
  .bpm-filter input::-webkit-outer-spin-button,
  .bpm-filter input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .bpm-filter input:focus { border-color: var(--accent); }
  .bpm-filter-sep {
    font-size: 10px;
    color: var(--muted);
  }
  #beats-container { display: flex; flex-direction: column; gap: 0; }
  .beat-block {
    background: var(--surface);
    padding: 12px 8px 24px;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .beat-block.locked .cell { cursor: default; pointer-events: none; }
  .beat-block.locked .beat-name { pointer-events: none; opacity: 0.75; }
  .beat-block.locked .beat-bpm { pointer-events: none; opacity: 0.75; }
  .beat-block.locked .btn-clear-pattern { opacity: 0.25; pointer-events: none; }
  .beat-block.locked .btn-add-track { opacity: 0.25; pointer-events: none; }
  .beat-block.locked .row-label-input { pointer-events: none; }
  .beat-block.locked .btn-del-track { opacity: 0; pointer-events: none; }
  .beat-block.locked .color-swatch { pointer-events: none; }

  .btn-icon.btn-play { border-color: var(--beat-color, var(--border)); color: var(--beat-color, var(--muted)); }
  .btn-icon.btn-play:hover { background: rgba(255,255,255,0.05); }
  .btn-icon.btn-play.playing { background: var(--beat-color, var(--accent)); color: #000; border-color: var(--beat-color, var(--accent)); }

  /* ── Beat header ── */
  .beat-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: nowrap;
  }
  .beat-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--beat-color, var(--border));
    color: var(--text);
    outline: none;
    min-width: 0;
    flex: 1 1 auto;
    transition: border-color 0.2s;
    line-height: 1.2;
  }
  .beat-name:focus { border-color: var(--beat-color, var(--accent)); }
  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 0;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .btn-icon svg { display: block; }
  .btn-icon.btn-edit:hover     { color: #f0c040; border-color: #f0c040; }
  .btn-icon.btn-edit.editing   { color: #f0c040; border-color: #f0c040; background: rgba(240,192,64,0.08); }
  .btn-icon.btn-clear-pattern:hover { color: #fff; border-color: #888; }
  .btn-icon.btn-delete:hover { color: var(--accent2); border-color: var(--accent2); background: rgba(255,92,92,0.07); }

  /* ── BPM row ── */
  .beat-meta {
    display: flex;
    align-items: baseline;
    gap: 5px;
    margin-bottom: 12px;
  }
  .bpm-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .beat-bpm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    background: transparent;
    border: none;
    color: var(--muted);
    outline: none;
    width: 44px;
    line-height: 1;
    -moz-appearance: textfield;
  }
  .beat-bpm::-webkit-outer-spin-button,
  .beat-bpm::-webkit-inner-spin-button { -webkit-appearance: none; }
  .beat-bpm:focus { color: var(--accent); }

  /* ── Grid ── */
  .grid-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    margin-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .grid-wrapper::-webkit-scrollbar { display: none; }
  .grid {
    --cell: calc((100vw - var(--outer-pad) - var(--label-w) - 33 * var(--gap)) / 32);
    display: grid;
    grid-template-columns: var(--label-w) repeat(32, var(--cell));
    gap: var(--gap);
    width: calc(var(--label-w) + 32 * var(--cell) + 33 * var(--gap));
  }

  /* ── Row label ── */
  .row-label-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    height: var(--cell);
    gap: 3px;
    padding-right: 4px;
  }
  .color-swatch {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
    position: relative;
  }
  .color-swatch input[type=color] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    opacity: 0;
    cursor: pointer;
    border: none;
    padding: 0;
  }
  .row-label-input {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #888;
    background: transparent;
    border: none;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    text-align: right;
    width: 100%;
    min-width: 0;
    cursor: text;
  }
  .row-label-input:focus {
    color: var(--text);
    border-bottom: 1px solid var(--accent);
  }
  .btn-del-track {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    background: transparent;
    border: none;
    color: #444;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.15s;
    font-size: 10px;
    line-height: 1;
  }
  .btn-del-track:hover { color: var(--accent2); }

  .step-num {
    font-size: 9px;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(var(--cell) * 0.7);
    user-select: none;
  }
  .step-num.beat-mark { color: var(--muted); font-weight: 700; }

  /* ── Cells ── */
  .cell {
    height: var(--cell);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
  }
  @media (orientation: portrait) {
    .grid {
      --cell: calc((100vw - var(--outer-pad) - var(--label-w) - 33 * 1px) / 32);
      gap: 1px;
      width: calc(var(--label-w) + 32 * var(--cell) + 33 * 1px);
      grid-template-columns: var(--label-w) repeat(32, var(--cell));
    }
    .cell { border-radius: 1px; }
  }
  .cell.grp-a { background: var(--cell-a); }
  .cell.grp-b { background: var(--cell-b); }
  .beat-block:not(.locked) .cell:hover { filter: brightness(1.7); transform: scale(1.05); }

  .cell.playing-step { outline: 2px solid rgba(255,255,255,0.6); outline-offset: -1px; }

  /* ── Add track ── */
  .add-track-row { display: flex; align-items: center; margin-top: 0; }
  .btn-add-track {
    font-size: 9px !important;
    color: #888 !important;
    background: transparent;
    border: none;
    padding: 3px 0;
    letter-spacing: 0.3px !important;
    text-transform: uppercase;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
    font-family: 'Space Mono', monospace !important;
  }
  .btn-add-track:hover { color: var(--text) !important; }

  /* ── Empty state ── */
  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    border: 2px dashed var(--border);
  }
  #empty-state h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: #444;
  }
  #empty-state p { font-size: 12px; }

  /* ── Confirm modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #1e1e1e;
    border: 1px solid #444;
    border-top: 3px solid var(--accent2);
    padding: 24px 20px 20px;
    max-width: 320px;
    width: 100%;
    animation: slideUp 0.15s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal p {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px;
    text-transform: uppercase;
    font-size: 12px;
  }
  .modal-btn-cancel:hover { color: var(--text); border-color: #666; }
  .modal-btn-confirm {
    background: var(--accent2);
    color: #fff;
    border: none;
    padding: 10px;
    text-transform: uppercase;
    font-size: 12px;
    font-weight: 700;
  }
  .modal-btn-confirm:hover { background: #ff7070; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 12px 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<h1 class="page-title">BEAT SEQUENCER</h1>

<div class="toolbar">
  <button class="btn-add" onclick="addBeat()">Beat</button>
  <button class="btn-save" onclick="saveToJSON()">Save</button>
  <button class="btn-load" onclick="loadFromJSON()">Load</button>
</div>
<div class="toolbar-filters">
  <button class="btn-sort" id="btn-sort" onclick="cycleSortBeats()">Trier</button>
  <div class="bpm-filter">
    <span class="bpm-filter-label">BPM</span>
    <input type="number" id="bpm-min" min="20" max="300" placeholder="—" oninput="applyBpmFilter()">
    <span class="bpm-filter-sep">→</span>
    <input type="number" id="bpm-max" min="20" max="300" placeholder="—" oninput="applyBpmFilter()">
  </div>
</div>
<div id="beats-container"></div>
<div id="empty-state">
  <h2>Aucun beat</h2>
  <p>Cliquez sur &laquo; Beat &raquo; pour commencer</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const DEFAULT_TRACKS = ['HH','SNARE','KICK'];
  const DEFAULT_COLORS = ['#9c7fe8','#4fc3f7','#e8b84b'];
  const STEPS = 32;
  const STORAGE_KEY = 'beat_sequencer_v4';

  let beats = [];
  let beatCounter = 0;

  /* ── SVG icons ── */
  const SVG_LOCK_OPEN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>';
  const SVG_LOCK_CLOSED = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
  const SVG_ERASE = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
  const SVG_CROSS = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  /* ── Safe storage ── */
  var _store = (function() {
    try {
      localStorage.setItem('_t_', '1');
      localStorage.removeItem('_t_');
      return localStorage;
    } catch(e) {
      var m = {};
      return {
        getItem: function(k) { return m[k] !== undefined ? m[k] : null; },
        setItem: function(k, v) { m[k] = v; },
        removeItem: function(k) { delete m[k]; }
      };
    }
  }());

  /* ── Confirm modal ── */
  function showConfirm(msg, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    const p = document.createElement('p');
    p.textContent = msg;
    const btns = document.createElement('div');
    btns.className = 'modal-btns';
    const bCancel = document.createElement('button');
    bCancel.className = 'modal-btn-cancel';
    bCancel.textContent = 'Annuler';
    bCancel.onclick = () => document.body.removeChild(overlay);
    const bConfirm = document.createElement('button');
    bConfirm.className = 'modal-btn-confirm';
    bConfirm.textContent = 'Supprimer';
    bConfirm.onclick = () => { document.body.removeChild(overlay); onConfirm(); };
    btns.append(bCancel, bConfirm);
    modal.append(p, btns);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  }

  /* ── Storage ── */
  function loadFromStorage() {
    try {
      const raw = _store.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        beats = (data.beats || []).map(b => ({
          id: b.id || uid(),
          name: b.name || 'Beat',
          bpm: b.bpm || 80,
          accent: b.accent || randomAccent(),
          tracks: Array.isArray(b.tracks) && b.tracks.length
            ? b.tracks.map(t => typeof t === 'string' ? t : (t.name || 'Track'))
            : [...DEFAULT_TRACKS],
          colors: Array.isArray(b.colors) && b.colors.length
            ? b.colors
            : [...DEFAULT_COLORS],
          pattern: Array.isArray(b.pattern) && b.pattern.length
            ? b.pattern
            : emptyPattern(Array.isArray(b.tracks) ? b.tracks.length : DEFAULT_TRACKS.length),
          editing: false
        }));
        beatCounter = data.beatCounter || beats.length;
      }
    } catch(e) { beats = []; beatCounter = 0; }
    renderAll();
  }

  function saveToStorage() {
    try { _store.setItem(STORAGE_KEY, JSON.stringify({ beats, beatCounter })); } catch(e) {}
  }

  /* ── Beat CRUD ── */
  function emptyPattern(n) {
    return Array.from({ length: n }, () => new Array(STEPS).fill(false));
  }

  function addBeat() {
    beatCounter++;
    const tracks = [...DEFAULT_TRACKS];
    const colors = [...DEFAULT_COLORS];
    beats.unshift({
      id: uid(), name: 'Beat ' + beatCounter, bpm: 80,
      accent: randomAccent(),
      tracks, colors, pattern: emptyPattern(tracks.length), editing: true
    });
    renderAll();
    saveToStorage();
  }

  function randomAccent() {
    var hue = Math.floor(Math.random() * 360);
    return 'hsl(' + hue + ', 70%, 60%)';
  }

  function deleteBeat(id) {
    const b = beats.find(b => b.id === id);
    showConfirm('Supprimer le beat ' + (b ? b.name : '') + ' ?', () => {
      beats = beats.filter(b => b.id !== id);
      renderAll();
      saveToStorage();
    });
  }

  function clearPattern(id) {
    const b = beats.find(b => b.id === id);
    if (!b || !b.editing) return;
    b.pattern = emptyPattern(b.tracks.length);
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (block) block.querySelectorAll('.cell.active').forEach(c => {
      c.classList.remove('active');
      c.style.background = '';
      c.style.borderColor = '';
    });
    saveToStorage();
  }

  function toggleCell(id, ti, step) {
    const b = beats.find(b => b.id === id);
    if (!b || !b.editing) return;
    if (!b.pattern[ti] || step < 0 || step >= STEPS) return;
    b.pattern[ti][step] = !b.pattern[ti][step];
    const cell = document.querySelector('.beat-block[data-id="' + id + '"] [data-track="' + ti + '"][data-step="' + step + '"]');
    if (cell) {
      const active = b.pattern[ti][step];
      cell.classList.toggle('active', active);
      const color = b.colors[ti] || '#888';
      cell.style.background = active ? color : '';
      cell.style.borderColor = active ? color : '';
    }
    saveToStorage();
  }

  function updateName(id, val) {
    const b = beats.find(b => b.id === id);
    if (b) { b.name = val; saveToStorage(); }
  }

  function updateBpm(id, val) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    const n = parseInt(val);
    b.bpm = (!isNaN(n) && n >= 20 && n <= 300) ? n : (b.bpm || 80);
    saveToStorage();
  }

  function updateTrackName(id, ti, val) {
    const b = beats.find(b => b.id === id);
    if (b && ti >= 0 && ti < b.tracks.length) { b.tracks[ti] = val; saveToStorage(); }
  }

  function updateTrackColor(id, ti, color) {
    const b = beats.find(b => b.id === id);
    if (!b || ti < 0 || ti >= b.tracks.length) return;
    b.colors[ti] = color;
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (block) {
      const swatch = block.querySelector('.color-swatch[data-ti="' + ti + '"]');
      if (swatch) {
        swatch.style.background = color;
        const inp = swatch.querySelector('input[type=color]');
        if (inp) inp.value = color;
      }
      block.querySelectorAll('[data-track="' + ti + '"].active').forEach(c => {
        c.style.background = color;
        c.style.borderColor = color;
      });
    }
    saveToStorage();
  }

  function addTrack(id) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    b.tracks.unshift('New');
    b.colors.unshift('#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0').slice(0, 6));
    b.pattern.unshift(new Array(STEPS).fill(false));
    rebuildGrid(id);
    saveToStorage();
  }

  function deleteTrack(id, ti) {
    const b = beats.find(b => b.id === id);
    if (!b || b.tracks.length <= 1) return;
    showConfirm('Supprimer la piste ' + b.tracks[ti] + ' ?', () => {
      b.tracks.splice(ti, 1);
      b.colors.splice(ti, 1);
      b.pattern.splice(ti, 1);
      rebuildGrid(id);
      saveToStorage();
    });
  }

  function toggleEdit(id) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    b.editing = !b.editing;
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (!block) return;
    block.classList.toggle('locked', !b.editing);
    const btn = block.querySelector('.btn-edit');
    if (btn) {
      btn.innerHTML = b.editing ? SVG_LOCK_OPEN : SVG_LOCK_CLOSED;
      btn.classList.toggle('editing', b.editing);
      btn.title = b.editing ? 'Verrouiller' : 'Modifier';
    }
    const nameEl = block.querySelector('.beat-name');
    if (nameEl) nameEl.readOnly = !b.editing;
    const bpmEl = block.querySelector('.beat-bpm');
    if (bpmEl) bpmEl.readOnly = !b.editing;
    block.querySelectorAll('.row-label-input').forEach(i => i.readOnly = !b.editing);
    saveToStorage();
  }

  function rebuildGrid(id) {
    const b = beats.find(b => b.id === id);
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (!b || !block) return;
    const oldWrapper = block.querySelector('.grid-wrapper');
    const oldAdd = block.querySelector('.add-track-row');
    if (oldWrapper) block.replaceChild(buildGrid(b), oldWrapper);
    if (oldAdd) block.replaceChild(buildAddTrackRow(b), oldAdd);
    else block.appendChild(buildAddTrackRow(b));
  }

  /* ── Sort ── */
  var sortMode = -1;
  var sortLabels = ['A\u2192Z', 'Z\u2192A', 'Nouveau', 'Ancien'];

  function cycleSortBeats() {
    if (beats.length < 2) return;
    sortMode = (sortMode + 1) % 4;
    if (sortMode === 0) {
      // A→Z : A en premier
      beats.sort(function(a, b) { return a.name.toLowerCase() < b.name.toLowerCase() ? -1 : a.name.toLowerCase() > b.name.toLowerCase() ? 1 : 0; });
    } else if (sortMode === 1) {
      // Z→A : Z en premier
      beats.sort(function(a, b) { return a.name.toLowerCase() > b.name.toLowerCase() ? -1 : a.name.toLowerCase() < b.name.toLowerCase() ? 1 : 0; });
    } else if (sortMode === 2) {
      // Nouveau : plus récent en premier
      beats.sort(function(a, b) { return b.id > a.id ? 1 : -1; });
    } else {
      // Ancien : plus ancien en premier
      beats.sort(function(a, b) { return a.id > b.id ? 1 : -1; });
    }
    var btn = document.getElementById('btn-sort');
    if (btn) btn.textContent = sortLabels[sortMode];
    renderAll();
    saveToStorage();
  }

  /* ── BPM Filter ── */
  function applyBpmFilter() { renderAll(); }

  function getFilteredBeats() {
    const minEl = document.getElementById('bpm-min');
    const maxEl = document.getElementById('bpm-max');
    const min = minEl && minEl.value !== '' ? parseInt(minEl.value) : null;
    const max = maxEl && maxEl.value !== '' ? parseInt(maxEl.value) : null;
    return beats.filter(b => {
      const bpm = b.bpm || 80;
      if (min !== null && bpm < min) return false;
      if (max !== null && bpm > max) return false;
      return true;
    });
  }

  function renderAll() {
    const container = document.getElementById('beats-container');
    const empty = document.getElementById('empty-state');
    container.innerHTML = '';
    const filtered = getFilteredBeats();
    if (filtered.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    filtered.forEach(b => container.appendChild(buildBeatBlock(b)));
  }

  function buildBeatBlock(beat) {
    if (!beat.accent) beat.accent = randomAccent();
    const block = document.createElement('div');
    block.className = 'beat-block' + (beat.editing ? '' : ' locked');
    block.dataset.id = beat.id;
    block.style.setProperty('--beat-color', beat.accent);

    const hdr = document.createElement('div');
    hdr.className = 'beat-header';
    const nameInput = document.createElement('input');
    nameInput.className = 'beat-name';
    nameInput.value = beat.name;
    nameInput.readOnly = !beat.editing;
    nameInput.spellcheck = false;
    nameInput.addEventListener('input', e => updateName(beat.id, e.target.value));
    const btnEdit = document.createElement('button');
    btnEdit.className = 'btn-icon btn-edit' + (beat.editing ? ' editing' : '');
    btnEdit.innerHTML = beat.editing ? SVG_LOCK_OPEN : SVG_LOCK_CLOSED;
    btnEdit.title = beat.editing ? 'Verrouiller' : 'Modifier';
    btnEdit.onclick = () => toggleEdit(beat.id);
    const btnClear = document.createElement('button');
    btnClear.className = 'btn-icon btn-clear-pattern';
    btnClear.innerHTML = SVG_ERASE;
    btnClear.title = 'Effacer le pattern';
    btnClear.onclick = () => clearPattern(beat.id);
    const btnDel = document.createElement('button');
    btnDel.className = 'btn-icon btn-delete';
    btnDel.innerHTML = SVG_CROSS;
    btnDel.title = 'Supprimer ce beat';
    btnDel.onclick = () => deleteBeat(beat.id);
    const btnPlay = document.createElement('button');
    btnPlay.className = 'btn-icon btn-play';
    btnPlay.dataset.beatId = beat.id;
    btnPlay.innerHTML = SVG_PLAY;
    btnPlay.title = 'Jouer';
    btnPlay.onclick = () => togglePlay(beat.id);
    hdr.append(nameInput, btnPlay, btnEdit, btnClear, btnDel);
    block.appendChild(hdr);

    const meta = document.createElement('div');
    meta.className = 'beat-meta';
    const bpmLbl = document.createElement('span');
    bpmLbl.className = 'bpm-label';
    bpmLbl.textContent = 'BPM';
    const bpmInput = document.createElement('input');
    bpmInput.className = 'beat-bpm';
    bpmInput.type = 'number';
    bpmInput.min = 20; bpmInput.max = 300;
    bpmInput.value = beat.bpm || 80;
    bpmInput.readOnly = !beat.editing;
    bpmInput.addEventListener('input', e => updateBpm(beat.id, e.target.value));
    meta.append(bpmLbl, bpmInput);
    block.appendChild(meta);

    block.appendChild(buildGrid(beat));
    block.appendChild(buildAddTrackRow(beat));
    return block;
  }

  function buildGrid(beat) {
    if (!beat.colors) beat.colors = [];
    while (beat.colors.length < beat.tracks.length) {
      beat.colors.push(DEFAULT_COLORS[beat.colors.length % DEFAULT_COLORS.length]);
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'grid-wrapper';
    const grid = document.createElement('div');
    grid.className = 'grid';

    const emptyLbl = document.createElement('div');
    emptyLbl.className = 'step-num';
    grid.appendChild(emptyLbl);
    for (let s = 0; s < STEPS; s++) {
      const n = document.createElement('div');
      n.className = 'step-num' + (s % 4 === 0 ? ' beat-mark' : '');
      n.textContent = s % 4 === 0 ? (s / 4 + 1) : '';
      grid.appendChild(n);
    }

    beat.tracks.forEach((track, ti) => {
      const color = beat.colors[ti] || '#888';
      const lblWrap = document.createElement('div');
      lblWrap.className = 'row-label-wrap';

      const swatch = document.createElement('div');
      swatch.className = 'color-swatch';
      swatch.dataset.ti = ti;
      swatch.style.background = color;
      const colorInput = document.createElement('input');
      colorInput.type = 'color';
      colorInput.value = color;
      colorInput.addEventListener('input', e => updateTrackColor(beat.id, ti, e.target.value));
      swatch.appendChild(colorInput);

      const labelInput = document.createElement('input');
      labelInput.className = 'row-label-input';
      labelInput.value = track;
      labelInput.readOnly = !beat.editing;
      labelInput.spellcheck = false;
      labelInput.addEventListener('input', e => updateTrackName(beat.id, ti, e.target.value));

      const btnDelTrack = document.createElement('button');
      btnDelTrack.className = 'btn-del-track';
      btnDelTrack.innerHTML = '&#x2715;';
      btnDelTrack.title = 'Supprimer cette piste';
      btnDelTrack.onclick = () => deleteTrack(beat.id, ti);

      lblWrap.append(swatch, labelInput, btnDelTrack);
      grid.appendChild(lblWrap);

      for (let s = 0; s < STEPS; s++) {
        const cell = document.createElement('div');
        const grp = Math.floor(s / 4) % 2 === 0 ? 'grp-a' : 'grp-b';
        cell.className = 'cell ' + grp;
        cell.dataset.track = ti;
        cell.dataset.step = s;
        if (beat.pattern[ti] && beat.pattern[ti][s]) {
          cell.classList.add('active');
          cell.style.background = color;
          cell.style.borderColor = color;
        }
        cell.addEventListener('click', (function(ss, tti) {
          return function() { toggleCell(beat.id, tti, ss); };
        }(s, ti)));
        grid.appendChild(cell);
      }
    });

    wrapper.appendChild(grid);
    return wrapper;
  }

  function buildAddTrackRow(beat) {
    const row = document.createElement('div');
    row.className = 'add-track-row';
    const btn = document.createElement('button');
    btn.className = 'btn-add-track';
    btn.textContent = '+ Ajouter une piste';
    btn.onclick = () => addTrack(beat.id);
    row.appendChild(btn);
    return row;
  }

  /* ── Export / Import ── */
  async function saveToJSON() {
    if (beats.length === 0) { showToast('Aucun beat a exporter'); return; }
    const data = {
      version: 4,
      exportedAt: new Date().toISOString(),
      beats: beats.map(b => ({
        name: b.name,
        bpm: b.bpm || 80,
        accent: b.accent || randomAccent(),
        tracks: b.tracks.map((t, ti) => ({
          name: t,
          color: (b.colors && b.colors[ti]) || DEFAULT_COLORS[ti % DEFAULT_COLORS.length],
          steps: b.pattern[ti] || new Array(STEPS).fill(false)
        }))
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const file = new File([blob], 'beats.json', { type: 'application/json' });
    try {
      await navigator.share({ files: [file] });
    } catch(e) {
      if (e.name !== 'AbortError') showToast('Partage non supporte');
    }
  }

  function loadFromJSON() {
    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    ov.style.alignItems = 'flex-end';
    ov.style.padding = '0';
    const panel = document.createElement('div');
    panel.style.cssText = 'background:#1a1a1a;border-top:3px solid #a0e080;padding:20px 16px 32px;width:100%;';
    const h2 = document.createElement('div');
    h2.style.cssText = 'font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:1px;color:#f0f0f0;margin-bottom:8px;';
    h2.textContent = 'Restaurer';
    const hint = document.createElement('div');
    hint.style.cssText = 'font-size:10px;color:#666;margin-bottom:10px;line-height:1.5;';
    hint.textContent = 'Colle le contenu de ton fichier beats.json puis appuie sur Restaurer.';
    const ta = document.createElement('textarea');
    ta.style.cssText = 'display:block;width:100%;height:150px;background:#0e0e0e;border:1px solid #444;color:#a0e080;font-family:Space Mono,monospace;font-size:10px;padding:10px;resize:none;outline:none;-webkit-user-select:text;user-select:text;';
    ta.placeholder = 'Colle ton JSON ici...';
    const btns = document.createElement('div');
    btns.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;';
    const bCancel = document.createElement('button');
    bCancel.style.cssText = 'background:transparent;color:#666;border:1px solid #333;padding:10px;text-transform:uppercase;font-size:12px;font-family:Space Mono,monospace;cursor:pointer;letter-spacing:1px;';
    bCancel.textContent = 'Annuler';
    bCancel.onclick = () => document.body.removeChild(ov);
    const bOk = document.createElement('button');
    bOk.style.cssText = 'background:#a0e080;color:#000;border:none;padding:10px;text-transform:uppercase;font-size:12px;font-weight:700;font-family:Space Mono,monospace;cursor:pointer;letter-spacing:1px;';
    bOk.textContent = 'Restaurer';
    bOk.onclick = () => {
      const text = ta.value.trim();
      if (!text) { showToast('Rien a coller'); return; }
      try {
        const data = JSON.parse(text);
        if (!data.beats || !Array.isArray(data.beats)) throw new Error();
        beats = data.beats.map(b => {
          const rawTracks = Array.isArray(b.tracks) && b.tracks.length ? b.tracks : [];
          return {
            id: uid(), name: b.name || 'Beat', bpm: b.bpm || 80,
            accent: b.accent || randomAccent(),
            tracks: rawTracks.map(t => t.name || 'Track'),
            colors: rawTracks.map((t, i) => t.color || DEFAULT_COLORS[i % DEFAULT_COLORS.length]),
            pattern: rawTracks.map(t => Array.isArray(t.steps) && t.steps.length === STEPS ? t.steps : new Array(STEPS).fill(false)),
            editing: false
          };
        });
        beatCounter = beats.length;
        saveToStorage(); renderAll();
        document.body.removeChild(ov);
        showToast('Restaure !');
      } catch(e) { showToast('JSON invalide'); }
    };
    btns.append(bCancel, bOk);
    panel.append(h2, hint, ta, btns);
    ov.appendChild(panel);
    document.body.appendChild(ov);
    setTimeout(() => ta.focus(), 50);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function uid() { return String(Date.now()) + String(Math.random()).slice(2); }

  const SVG_PLAY = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
  const SVG_STOP = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"/></svg>';

  /* ── Audio engine ── */
  const SAMPLE_BASE = 'https://tonejs.github.io/audio/drum-samples/acoustic-kit/';
  const SAMPLE_MAP = {
    'kick':       SAMPLE_BASE + 'kick.mp3',
    'bd':         SAMPLE_BASE + 'kick.mp3',
    'k':          SAMPLE_BASE + 'kick.mp3',
    'snare':      SAMPLE_BASE + 'snare.mp3',
    'sn':         SAMPLE_BASE + 'snare.mp3',
    'sd':         SAMPLE_BASE + 'snare.mp3',
    'hh':         SAMPLE_BASE + 'hihat.mp3',
    'hihat':      SAMPLE_BASE + 'hihat.mp3',
    'closed hh':  SAMPLE_BASE + 'hihat.mp3',
    'open hh':    SAMPLE_BASE + 'hihat.mp3',
    'oh':         SAMPLE_BASE + 'hihat.mp3',
    'clap':       SAMPLE_BASE + 'snare.mp3',
    'cp':         SAMPLE_BASE + 'snare.mp3',
    'tom':        SAMPLE_BASE + 'kick.mp3',
    'alt kick':   SAMPLE_BASE + 'kick.mp3',
    'alt snare':  SAMPLE_BASE + 'snare.mp3',
    'perc':       SAMPLE_BASE + 'hihat.mp3',
    'rim':        SAMPLE_BASE + 'snare.mp3',
    'new':        SAMPLE_BASE + 'kick.mp3',
  };

  var activePlayers = {}; // beatId -> { loop, players }

  function getSampleUrl(trackName) {
    const key = trackName.toLowerCase().trim();
    return SAMPLE_MAP[key] || SAMPLE_BASE + 'Kick.mp3';
  }

  async function togglePlay(id) {
    await Tone.start();
    if (activePlayers[id]) {
      stopBeat(id);
    } else {
      await startBeat(id);
    }
  }

  async function startBeat(id) {
    const b = beats.find(b => b.id === id);
    if (!b) return;

    Object.keys(activePlayers).forEach(pid => stopBeat(pid));
    Tone.getTransport().stop();
    Tone.getTransport().cancel();
    Tone.getTransport().bpm.value = b.bpm || 80;

    // Build url map
    const urlMap = {};
    b.tracks.forEach((track, ti) => {
      urlMap[String(ti)] = getSampleUrl(track);
    });

    // Load all samples via Tone.Players
    const players = await new Promise(resolve => {
      const p = new Tone.Players(urlMap, () => resolve(p)).toDestination();
    });

    let step = 0;
    const loop = new Tone.Sequence((time) => {
      const currentStep = step;
      b.tracks.forEach((track, ti) => {
        if (b.pattern[ti] && b.pattern[ti][currentStep]) {
          try { players.player(String(ti)).start(time); } catch(e) {}
        }
      });
      setTimeout(() => highlightStep(id, currentStep), 0);
      step = (step + 1) % STEPS;
    }, [...Array(STEPS).keys()], '16n');

    loop.start(0);
    Tone.getTransport().start();

    activePlayers[id] = { loop, players };
    updatePlayBtn(id, true);
  }

  function stopBeat(id) {
    const ap = activePlayers[id];
    if (!ap) return;
    ap.loop.stop();
    ap.loop.dispose();
    try { ap.players.dispose(); } catch(e) {}
    delete activePlayers[id];
    Tone.getTransport().stop();
    Tone.getTransport().cancel();
    clearHighlight(id);
    updatePlayBtn(id, false);
  }

  function updatePlayBtn(id, playing) {
    const btn = document.querySelector('.btn-play[data-beat-id="' + id + '"]');
    if (!btn) return;
    btn.innerHTML = playing ? SVG_STOP : SVG_PLAY;
    btn.title = playing ? 'Stop' : 'Jouer';
    btn.classList.toggle('playing', playing);
  }

  function highlightStep(id, step) {
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (!block) return;
    block.querySelectorAll('.cell').forEach(c => c.classList.remove('playing-step'));
    block.querySelectorAll('[data-step="' + step + '"]').forEach(c => c.classList.add('playing-step'));
  }

  function clearHighlight(id) {
    const block = document.querySelector('.beat-block[data-id="' + id + '"]');
    if (!block) return;
    block.querySelectorAll('.cell').forEach(c => c.classList.remove('playing-step'));
  }

  loadFromStorage();
</script>
</body>
