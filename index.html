<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #333;
    --accent: #4fc3f7;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #666;
    --gap: 3px;
    --label-w: 82px;
    --cell-a: #252525;
    --cell-b: #1c1c1c;
    --outer-pad: 72px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 28px 20px 80px;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  button {
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    border: none;
    transition: all 0.15s;
  }
  .btn-add {
    background: var(--accent);
    color: #000;
    padding: 10px;
    font-weight: 700;
    text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .btn-add:hover { background: #81d4fa; transform: translateY(-1px); }
  .btn-save {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 10px;
    text-transform: uppercase;
  }
  .btn-save:hover { background: rgba(79,195,247,0.1); }
  .btn-load {
    background: transparent;
    color: #a0e080;
    border: 1px solid #a0e080;
    padding: 10px;
    text-transform: uppercase;
  }
  .btn-load:hover { background: rgba(160,224,128,0.1); }

  /* ── Beat block ── */
  #beats-container { display: flex; flex-direction: column; gap: 36px; }
  .beat-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    padding: 16px 16px 20px;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .beat-block.locked .cell { cursor: default; pointer-events: none; }
  .beat-block.locked .beat-name { pointer-events: none; opacity: 0.75; }
  .beat-block.locked .beat-bpm { pointer-events: none; opacity: 0.75; }
  .beat-block.locked .btn-clear-pattern { opacity: 0.25; pointer-events: none; }
  .beat-block.locked .btn-add-track { opacity: 0.25; pointer-events: none; }
  .beat-block.locked .row-label-input { pointer-events: none; }
  .beat-block.locked .btn-del-track { opacity: 0; pointer-events: none; }
  .beat-block.locked .color-swatch { pointer-events: none; }

  /* ── Beat header ── */
  .beat-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: nowrap;
  }
  .beat-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    outline: none;
    min-width: 0;
    flex: 1 1 auto;
    transition: border-color 0.2s;
    line-height: 1.2;
  }
  .beat-name:focus { border-color: var(--accent); }
  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 0;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .btn-icon svg { display: block; }
  .btn-icon.btn-edit:hover     { color: #f0c040; border-color: #f0c040; }
  .btn-icon.btn-edit.editing   { color: #f0c040; border-color: #f0c040; background: rgba(240,192,64,0.08); }
  .btn-icon.btn-clear-pattern:hover { color: #fff; border-color: #888; }
  .btn-icon.btn-delete:hover { color: var(--accent2); border-color: var(--accent2); background: rgba(255,92,92,0.07); }

  /* ── BPM row ── */
  .beat-meta {
    display: flex;
    align-items: baseline;
    gap: 5px;
    margin-bottom: 12px;
  }
  .bpm-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .beat-bpm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    background: transparent;
    border: none;
    color: var(--muted);
    outline: none;
    width: 44px;
    line-height: 1;
    -moz-appearance: textfield;
  }
  .beat-bpm::-webkit-outer-spin-button,
  .beat-bpm::-webkit-inner-spin-button { -webkit-appearance: none; }
  .beat-bpm:focus { color: var(--accent); }

  /* ── Grid ── */
  .grid-wrapper {
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .grid-wrapper::-webkit-scrollbar { height: 4px; }
  .grid-wrapper::-webkit-scrollbar-track { background: transparent; }
  .grid-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .grid {
    --cell: calc((100vw - var(--outer-pad) - var(--label-w) - 17 * var(--gap)) / 16);
    display: grid;
    grid-template-columns: var(--label-w) repeat(32, var(--cell));
    gap: var(--gap);
    width: calc(var(--label-w) + 32 * var(--cell) + 33 * var(--gap));
  }
  @media (orientation: landscape) {
    .grid { --cell: calc((100vw - var(--outer-pad) - var(--label-w) - 33 * var(--gap)) / 32); }
  }

  /* ── Row label ── */
  .row-label-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    height: var(--cell);
    gap: 3px;
    padding-right: 4px;
  }
  /* color swatch */
  .color-swatch {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
    position: relative;
  }
  .color-swatch input[type=color] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    opacity: 0;
    cursor: pointer;
    border: none;
    padding: 0;
  }
  .row-label-input {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: transparent;
    border: none;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    text-align: right;
    width: 100%;
    min-width: 0;
    cursor: text;
  }
  .row-label-input:focus {
    color: var(--text);
    border-bottom: 1px solid var(--accent);
  }
  .btn-del-track {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    background: transparent;
    border: none;
    color: #444;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.15s;
    font-size: 10px;
    line-height: 1;
  }
  .btn-del-track:hover { color: var(--accent2); }

  /* step numbers */
  .step-num {
    font-size: 9px;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(var(--cell) * 0.7);
    user-select: none;
  }
  .step-num.beat-mark { color: var(--muted); font-weight: 700; }

  /* ── Cells ── */
  .cell {
    height: var(--cell);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
  }
  .cell.grp-a { background: var(--cell-a); border: 1px solid #2e2e2e; }
  .cell.grp-b { background: var(--cell-b); border: 1px solid #252525; }
  .beat-block:not(.locked) .cell:hover { filter: brightness(1.7); transform: scale(1.05); }

  /* ── Add track ── */
  .add-track-row { display: flex; align-items: center; margin-top: 8px; }
  .btn-add-track {
    font-size: 10px;
    color: #444;
    background: transparent;
    border: none;
    padding: 5px 0;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
  }
  .btn-add-track:hover { color: var(--muted); }

  /* ── Empty state ── */
  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    border: 2px dashed var(--border);
  }
  #empty-state h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: #444;
  }
  #empty-state p { font-size: 12px; }

  /* ── Confirm modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #1e1e1e;
    border: 1px solid #444;
    border-top: 3px solid var(--accent2);
    padding: 24px 20px 20px;
    max-width: 320px;
    width: 100%;
    animation: slideUp 0.15s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal p {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .modal-btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px;
    text-transform: uppercase;
    font-size: 12px;
  }
  .modal-btn-cancel:hover { color: var(--text); border-color: #666; }
  .modal-btn-confirm {
    background: var(--accent2);
    color: #fff;
    border: none;
    padding: 10px;
    text-transform: uppercase;
    font-size: 12px;
    font-weight: 700;
  }
  .modal-btn-confirm:hover { background: #ff7070; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 12px 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<h1 class="page-title">BEAT SEQUENCER</h1>

<div class="toolbar">
  <button class="btn-add" onclick="addBeat()">Beat</button>
  <button class="btn-save" onclick="saveToJSON()">Save</button>
  <button class="btn-load" onclick="loadFromJSON()">Load</button>
</div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileLoad(event)">

<div id="beats-container"></div>
<div id="empty-state">
  <h2>Aucun beat</h2>
  <p>Cliquez sur « Beat » pour commencer</p>
</div>

<div class="toast" id="toast"></div>

<script>
  const DEFAULT_TRACKS = ['Perc','Open HH','Closed HH','Alt Snare','Snare','Alt Kick','Kick'];
  const DEFAULT_COLORS = ['#9c7fe8','#4fc3f7','#e8b84b','#b0b0b0','#d4830f','#888888','#e0e0e0'];
  const STEPS = 32;
  const STORAGE_KEY = 'beat_sequencer_v4';

  let beats = [];
  let beatCounter = 0;

  /* ── SVG icons ── */
  const SVG_LOCK_OPEN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;
  const SVG_LOCK_CLOSED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
  const SVG_ERASE = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>`;
  const SVG_CROSS = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

  /* ── Confirm modal ── */
  function showConfirm(msg, onConfirm) {
    const escaped = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <p>${escaped}</p>
        <div class="modal-btns">
          <button class="modal-btn-cancel">Annuler</button>
          <button class="modal-btn-confirm">Supprimer</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('.modal-btn-cancel').onclick = () => document.body.removeChild(overlay);
    overlay.querySelector('.modal-btn-confirm').onclick = () => {
      document.body.removeChild(overlay);
      onConfirm();
    };
    overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  }

  /* ── Storage ── */
  function loadFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        beats = (data.beats || []).map(b => ({
          id: b.id || uid(),
          name: b.name || 'Beat',
          bpm: b.bpm || 80,
          tracks: Array.isArray(b.tracks) && b.tracks.length
            ? b.tracks.map(t => typeof t === 'string' ? t : (t.name || 'Track'))
            : [...DEFAULT_TRACKS],
          colors: Array.isArray(b.colors) && b.colors.length
            ? b.colors
            : [...DEFAULT_COLORS],
          pattern: Array.isArray(b.pattern) && b.pattern.length ? b.pattern : emptyPattern(Array.isArray(b.tracks) && b.tracks.length ? b.tracks.length : DEFAULT_TRACKS.length),
          editing: b.editing === true
        }));
        beatCounter = data.beatCounter || beats.length;
      }
    } catch(e) {}
    renderAll();
  }

  function saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ beats, beatCounter }));
    } catch(e) {}
  }

  /* ── Beat CRUD ── */
  function emptyPattern(n) {
    return Array.from({ length: n }, () => new Array(STEPS).fill(false));
  }

  function addBeat() {
    beatCounter++;
    const tracks = [...DEFAULT_TRACKS];
    const colors = [...DEFAULT_COLORS];
    beats.push({
      id: uid(), name: `Beat ${beatCounter}`, bpm: 80,
      tracks, colors, pattern: emptyPattern(tracks.length), editing: true
    });
    renderAll();
    saveToStorage();
  }

  function deleteBeat(id) {
    const b = beats.find(b => b.id === id);
    showConfirm(`Supprimer le beat « ${b ? b.name : ''} » ?`, () => {
      beats = beats.filter(b => b.id !== id);
      renderAll();
      saveToStorage();
    });
  }

  function clearPattern(id) {
    const b = beats.find(b => b.id === id);
    if (!b || !b.editing) return;
    b.pattern = emptyPattern(b.tracks.length);
    const block = document.querySelector(`.beat-block[data-id="${id}"]`);
    if (block) block.querySelectorAll('.cell.active').forEach(c => {
      c.classList.remove('active');
      c.style.background = '';
      c.style.borderColor = '';
    });
    saveToStorage();
  }

  function toggleCell(id, ti, step) {
    const b = beats.find(b => b.id === id);
    if (!b || !b.editing) return;
    if (!b.pattern[ti] || step < 0 || step >= STEPS) return;
    b.pattern[ti][step] = !b.pattern[ti][step];
    const cell = document.querySelector(`.beat-block[data-id="${id}"] [data-track="${ti}"][data-step="${step}"]`);
    if (cell) {
      const active = b.pattern[ti][step];
      cell.classList.toggle('active', active);
      const color = b.colors[ti] || '#888';
      cell.style.background = active ? color : '';
      cell.style.borderColor = active ? color : '';
    }
    saveToStorage();
  }

  function updateName(id, val) {
    const b = beats.find(b => b.id === id);
    if (b) { b.name = val; saveToStorage(); }
  }

  function updateBpm(id, val) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    const n = parseInt(val);
    b.bpm = (!isNaN(n) && n >= 20 && n <= 300) ? n : (b.bpm || 80);
    saveToStorage();
  }

  function updateTrackName(id, ti, val) {
    const b = beats.find(b => b.id === id);
    if (b && ti >= 0 && ti < b.tracks.length) { b.tracks[ti] = val; saveToStorage(); }
  }

  function updateTrackColor(id, ti, color) {
    const b = beats.find(b => b.id === id);
    if (!b || ti < 0 || ti >= b.tracks.length) return;
    b.colors[ti] = color;
    const block = document.querySelector(`.beat-block[data-id="${id}"]`);
    if (block) {
      const swatch = block.querySelector(`.color-swatch[data-ti="${ti}"]`);
      if (swatch) {
        swatch.style.background = color;
        const inp = swatch.querySelector('input[type=color]');
        if (inp) inp.value = color;
      }
      block.querySelectorAll(`[data-track="${ti}"].active`).forEach(c => {
        c.style.background = color;
        c.style.borderColor = color;
      });
    }
    saveToStorage();
  }

  function addTrack(id) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    b.tracks.push('New');
    b.colors.push('#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0').slice(0, 6));
    b.pattern.push(new Array(STEPS).fill(false));
    rebuildGrid(id);
    saveToStorage();
  }

  function deleteTrack(id, ti) {
    const b = beats.find(b => b.id === id);
    if (!b || b.tracks.length <= 1) return;
    showConfirm(`Supprimer la piste « ${b.tracks[ti]} » ?`, () => {
      b.tracks.splice(ti, 1);
      b.colors.splice(ti, 1);
      b.pattern.splice(ti, 1);
      rebuildGrid(id);
      saveToStorage();
    });
  }

  function toggleEdit(id) {
    const b = beats.find(b => b.id === id);
    if (!b) return;
    b.editing = !b.editing;
    const block = document.querySelector(`.beat-block[data-id="${id}"]`);
    if (!block) return;
    block.classList.toggle('locked', !b.editing);
    const btn = block.querySelector('.btn-edit');
    if (btn) {
      btn.innerHTML = b.editing ? SVG_LOCK_OPEN : SVG_LOCK_CLOSED;
      btn.classList.toggle('editing', b.editing);
      btn.title = b.editing ? 'Verrouiller' : 'Modifier';
    }
    const nameEl = block.querySelector('.beat-name');
    if (nameEl) nameEl.readOnly = !b.editing;
    const bpmEl = block.querySelector('.beat-bpm');
    if (bpmEl) bpmEl.readOnly = !b.editing;
    block.querySelectorAll('.row-label-input').forEach(i => i.readOnly = !b.editing);
    saveToStorage();
  }

  function rebuildGrid(id) {
    const b = beats.find(b => b.id === id);
    const block = document.querySelector(`.beat-block[data-id="${id}"]`);
    if (!b || !block) return;
    const oldWrapper = block.querySelector('.grid-wrapper');
    const oldAdd = block.querySelector('.add-track-row');
    if (oldWrapper) block.replaceChild(buildGrid(b), oldWrapper);
    if (oldAdd) block.replaceChild(buildAddTrackRow(b), oldAdd);
    else block.appendChild(buildAddTrackRow(b));
  }

  /* ── Render ── */
  function renderAll() {
    const container = document.getElementById('beats-container');
    const empty = document.getElementById('empty-state');
    container.innerHTML = '';
    if (beats.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    beats.forEach(b => container.appendChild(buildBeatBlock(b)));
  }

  function buildBeatBlock(beat) {
    const block = document.createElement('div');
    block.className = 'beat-block' + (beat.editing ? '' : ' locked');
    block.dataset.id = beat.id;

    const hdr = document.createElement('div');
    hdr.className = 'beat-header';
    const nameInput = document.createElement('input');
    nameInput.className = 'beat-name';
    nameInput.value = beat.name;
    nameInput.readOnly = !beat.editing;
    nameInput.spellcheck = false;
    nameInput.addEventListener('input', e => updateName(beat.id, e.target.value));
    const btnEdit = document.createElement('button');
    btnEdit.className = 'btn-icon btn-edit' + (beat.editing ? ' editing' : '');
    btnEdit.innerHTML = beat.editing ? SVG_LOCK_OPEN : SVG_LOCK_CLOSED;
    btnEdit.title = beat.editing ? 'Verrouiller' : 'Modifier';
    btnEdit.onclick = () => toggleEdit(beat.id);
    const btnClear = document.createElement('button');
    btnClear.className = 'btn-icon btn-clear-pattern';
    btnClear.innerHTML = SVG_ERASE;
    btnClear.title = 'Effacer le pattern';
    btnClear.onclick = () => clearPattern(beat.id);
    const btnDel = document.createElement('button');
    btnDel.className = 'btn-icon btn-delete';
    btnDel.innerHTML = SVG_CROSS;
    btnDel.title = 'Supprimer ce beat';
    btnDel.onclick = () => deleteBeat(beat.id);
    hdr.append(nameInput, btnEdit, btnClear, btnDel);
    block.appendChild(hdr);

    const meta = document.createElement('div');
    meta.className = 'beat-meta';
    const bpmLbl = document.createElement('span');
    bpmLbl.className = 'bpm-label';
    bpmLbl.textContent = 'BPM';
    const bpmInput = document.createElement('input');
    bpmInput.className = 'beat-bpm';
    bpmInput.type = 'number';
    bpmInput.min = 20; bpmInput.max = 300;
    bpmInput.value = beat.bpm || 80;
    bpmInput.readOnly = !beat.editing;
    bpmInput.addEventListener('input', e => updateBpm(beat.id, e.target.value));
    meta.append(bpmLbl, bpmInput);
    block.appendChild(meta);

    block.appendChild(buildGrid(beat));
    block.appendChild(buildAddTrackRow(beat));
    return block;
  }

  function buildGrid(beat) {
    // ensure colors array is always valid before building
    if (!beat.colors) beat.colors = [];
    while (beat.colors.length < beat.tracks.length) {
      beat.colors.push(DEFAULT_COLORS[beat.colors.length % DEFAULT_COLORS.length]);
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'grid-wrapper';
    const grid = document.createElement('div');
    grid.className = 'grid';

    // Step numbers
    const emptyLbl = document.createElement('div');
    emptyLbl.className = 'step-num';
    grid.appendChild(emptyLbl);
    for (let s = 0; s < STEPS; s++) {
      const n = document.createElement('div');
      n.className = 'step-num' + (s % 4 === 0 ? ' beat-mark' : '');
      n.textContent = s % 4 === 0 ? (s / 4 + 1) : '';
      grid.appendChild(n);
    }

    beat.tracks.forEach((track, ti) => {
      const color = beat.colors[ti] || '#888';

      // label wrap: swatch + name + delete
      const lblWrap = document.createElement('div');
      lblWrap.className = 'row-label-wrap';

      // color swatch
      const swatch = document.createElement('div');
      swatch.className = 'color-swatch';
      swatch.dataset.ti = ti;
      swatch.style.background = color;
      const colorInput = document.createElement('input');
      colorInput.type = 'color';
      colorInput.value = color;
      colorInput.addEventListener('input', e => updateTrackColor(beat.id, ti, e.target.value));
      swatch.appendChild(colorInput);

      const labelInput = document.createElement('input');
      labelInput.className = 'row-label-input';
      labelInput.value = track;
      labelInput.readOnly = !beat.editing;
      labelInput.spellcheck = false;
      labelInput.addEventListener('input', e => updateTrackName(beat.id, ti, e.target.value));

      const btnDelTrack = document.createElement('button');
      btnDelTrack.className = 'btn-del-track';
      btnDelTrack.innerHTML = '✕';
      btnDelTrack.title = 'Supprimer cette piste';
      btnDelTrack.onclick = () => deleteTrack(beat.id, ti);

      lblWrap.append(swatch, labelInput, btnDelTrack);
      grid.appendChild(lblWrap);

      for (let s = 0; s < STEPS; s++) {
        const cell = document.createElement('div');
        const grp = Math.floor(s / 4) % 2 === 0 ? 'grp-a' : 'grp-b';
        cell.className = `cell ${grp}`;
        cell.dataset.track = ti;
        cell.dataset.step = s;
        if (beat.pattern[ti] && beat.pattern[ti][s]) {
          cell.classList.add('active');
          cell.style.background = color;
          cell.style.borderColor = color;
        }
        cell.addEventListener('click', () => toggleCell(beat.id, ti, s));
        grid.appendChild(cell);
      }
    });

    wrapper.appendChild(grid);
    return wrapper;
  }

  function buildAddTrackRow(beat) {
    const row = document.createElement('div');
    row.className = 'add-track-row';
    const btn = document.createElement('button');
    btn.className = 'btn-add-track';
    btn.textContent = '+ Ajouter une piste';
    btn.onclick = () => addTrack(beat.id);
    row.appendChild(btn);
    return row;
  }

  /* ── Export / Import ── */
  async function saveToJSON() {
    if (beats.length === 0) { showToast('Aucun beat à exporter !'); return; }
    const data = {
      version: 4,
      exportedAt: new Date().toISOString(),
      beats: beats.map(b => ({
        name: b.name,
        bpm: b.bpm || 80,
        tracks: b.tracks.map((t, ti) => ({
          name: t,
          color: (b.colors && b.colors[ti]) || DEFAULT_COLORS[ti % DEFAULT_COLORS.length],
          steps: b.pattern[ti] || new Array(STEPS).fill(false)
        }))
      }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const file = new File([blob], 'beats.json', { type: 'application/json' });
    try {
      await navigator.share({ files: [file] });
    } catch(e) {
      if (e.name !== 'AbortError') showToast('Partage non supporté');
    }
  }

  function loadFromJSON() { document.getElementById('file-input').click(); }

  function handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.beats || !Array.isArray(data.beats)) throw new Error('Format invalide');
        beats = data.beats.map(b => {
          const rawTracks = Array.isArray(b.tracks) && b.tracks.length ? b.tracks : [];
          return {
            id: uid(),
            name: b.name || 'Beat',
            bpm: b.bpm || 80,
            tracks: rawTracks.map(t => t.name || 'Track'),
            colors: rawTracks.map((t, i) => t.color || DEFAULT_COLORS[i % DEFAULT_COLORS.length]),
            pattern: rawTracks.map(t => Array.isArray(t.steps) && t.steps.length === STEPS ? t.steps : new Array(STEPS).fill(false)),
            editing: false
          };
        });
        beatCounter = beats.length;
        saveToStorage();
        renderAll();
        showToast('Fichier chargé !');
      } catch(err) {
        showToast('Fichier invalide');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function uid() { return String(Date.now()) + String(Math.random()).slice(2); }

  loadFromStorage();
</script>
